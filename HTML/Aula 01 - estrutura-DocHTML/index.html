<!-- comentários 
HTML: consiste em elementos que são trechos de código que possuem algum significado
que, juntos, vão compor o esqueleto da página WEB. 

NÃO é uma linguagem de programação. É uma linguagem de marcação de hipertexto.

Utilizamos TAGs para marcar os elementos que queremos dispor na tela.
< > : tag abertura e fechamento. tudo que estiver dentro dela é conteúdo
<head> : tudo que não vai ser visível no site, configurações e infos adicionais
<body> : o conteúdo da página, de fato.
tag <p> representa um parágrafo simples.
UTF - 8 : falando pro site que ele deve interpretar o html no UTF-8

    TAGS podem possuir atributos (ex: lang=pt-BR)
-->
<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <title>Aula 01</title>
        <meta charset = "UTF-8">
    </head>
    <body>
        <p>Olá Mundo</p>
    </body>
</html>

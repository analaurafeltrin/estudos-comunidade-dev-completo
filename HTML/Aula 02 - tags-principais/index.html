<!-- comentários 

 HEADINGS: "cabeçalhos" - textos principais, títulos
 tipos: <h1, h2, h3, h4, h5, h6>
     h1: sempre o título principal - SÓ TEM UM

    destacar palavras (tipo negrito: <b> ou <strong>)
    por strong, o programa já sabe que é importante pra mim
    por b, o programa entende que é apenas um negrito 
    
    destacar palavras com UNDERLINE: <u> 
    
    destacar palavras com ITÁLICO: <i>
 
 pra fazer comentários em qualquer arquivo: CTRL + ; 
 
 <a> : criar âncoras, para levar pra outro site ou parte do próprio site
 
 <nav> : barra de navegação do site
 
 <ul>: lista não ordenada

 <li> :lista ordenada

 <button>: botão no site 
    button onClick: falar o que quer que aconteça qdo clique no botão.
    por ex. poderia botar um código JS de aparecer um alerta na tela com "alert"
 
 <adress> : informações de contato. pode ser endereço, telefone, email
 
 TAG <div> : MUITO, MUITO IMPORTANTE. Divide as partes do nosso site para que a gente possa
 estilizar ele melhor. pode ser chamada por container.
  
 <section> : seção de notícias tech por exemplo
 -->

Virtual DOM:

tag vazia: <> </> precisa ter, se não tiver o código quebra.
não dá pra colocar dois componentes HTML sem ter isso, mas 
pode ser tanto vazia quanto algo (tipo <div>)

SÓ PODE SER USADO QUANDO TEM APENAS 1 COMPONENTE NO ARQUIVO.

export { App, App2 }; -> quando tem +1 componente no msm
arquivo. Daí ficaria no main.jsx: import {App} from './App'

No react precisa fechar todas as Tags (img etc)

-rocketseat (extensão) -> digitar rfc enter já cria uma base 
de componentes 

PROPS: passa informações de um componente pai p/ um filho

({X, Y})

const Button = ({iconImage, backgroundColor}) => {
  return (
    <div className="defaultButton linkedinButton">
      <img src={iconImage} alt="" aria-hidden="true" />
      <a href="https://www.linkedin.com/in/analaurafeltrin/" target="_blank">
        Confira meu linkedIn
      </a>
    </div>
  );
};

CHILDREN: 
Componente filho que recebe as props

  return (
    <div className="defaultButton linkedinButton">
      <img src={iconImage} alt="" aria-hidden="true" />
      <a href="https://www.linkedin.com/in/analaurafeltrin/" target="_blank" 
      > {children}
        Confira meu linkedIn 
      </a>
    </div>
  );
};


export default Button;

<!-- STATE E REACT HOOKS

Toda tela tem um estado inicial, atual, etc
(ciclo de vida componentes do react)

Colocamos condições lógicas dependendo do estado que o componente
estiver. Podemos fazer isso através dos Hooks

USE STATE 

Pra alterar algo: set___.

import { useState } from 'react'

const App () => {
  const [count, setCount] = useState(0)
    cont [variável que salva o estado, método chamado p/ modificar estado]
    = hook (valor inicial)
  
  <>
  <div> 
      <a href "..." target=.. img... alt... </a>
  </div>
  <h1> vite + react </h1>
  <button onClick = {() => setCount((count) => count +1 )}>
                            aqui acima é disponibilizada para caso
                            queira usar o estado anterior da 
                            variável (ex: 9 +1, +1, +1...)
    count is {count}
  </button> 
  ) 
  </>

  UMA FUNÇÃO ANÔNIMA FOI CRIADA ALI NO BUTTON MSM, PODERIA SER
  EM CIMA. 
  

  obs: usa muito em - valores dos inputs em estados em forms
                    - contadores (igual ex. abaixo)
                    - respostas de back-end points p/ informar ao cliente
  }

USE EFFECT
  A cada vez que uma variável for modificada de valor, uma lógica
  pode ser executada.

  import { useEffect } from 'react';

  useEffect (() => { 
            1º parâmetro


  },[]); 
    2º parâmetro: coloca as callBacks que quer que fique ouvindo 
    (parecido com o addEventListener do JS Vanilla - puro)

-->
